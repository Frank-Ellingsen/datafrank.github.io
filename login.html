<!DOCTYPE html>
<html lang="en">
<head>

  <title>Login | Frank Ellingsen</title>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    body {
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #page-wrapper {
      flex: 1;
    }
    .login-container {
      max-width: 450px;
      margin: 80px auto;
      background: #fff;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.07);
      border-top: 6px solid #007897;
    }
    .login-container h2 {
      text-align: center;
      color: #007897;
      margin-bottom: 2rem;
      font-size: 2.2rem;
      border: none;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #475569;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.85rem;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s ease;
      background: #f8fafc;
    }
    .form-group input:focus {
      outline: none;
      border-color: #007897;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 120, 151, 0.1);
    }
    .login-button {
      width: 100%;
      background: #007897;
      color: #fff;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
    }
    .login-button:hover {
      background: #005f73;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 95, 115, 0.2);
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #64748b;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .back-home:hover {
      color: #007897;
    }
  </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5DSMFK94"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
  <div id="page-wrapper">
    <!-- Header -->
    <div id="header-wrapper">
      <div class="container">
        <header id="header">
          <h1><a href="index.html" id="logo">data_frank</a></h1>
          <nav id="nav">
            <a href="index.html">Home</a>
            <a href="p1.html">MS Fabric</a>
            <a href="p2.html">Power BI</a>
            <a href="p3.html">Exploratory Dashboard</a>
            <a href="p4.html">Excel Data Model</a>
            <a href="login.html" class="current-page-item">Login</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main">
      <div class="container">
        <div class="login-container">
          <h2>Admin Login</h2>
          <form id="login-form">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="login-button">Sign In</button>
          </form>
          <a href="index.html" class="back-home">← Back to Portfolio</a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer-wrapper">
      <div class="container">
        <div id="copyright">
          &copy; Frank Ellingsen. All rights reserved.
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      if (username) {
        alert('Access Granted. Welcome, ' + username + '!');
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
